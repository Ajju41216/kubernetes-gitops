replicaCount: 3

image:
  repository: vote
  tag: "01"
  pullPolicy: IfNotPresent

labels:
  app: vote
  tier: frontend
  environment: lab
  version: v1

service:
  type: ClusterIP
  port: 80
  targetPort: 80

config:
  redisHost: redis
  redisPort: "6379"

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 128Mi

probes:
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 5

  liveness:
    initialDelaySeconds: 15
    periodSeconds: 10