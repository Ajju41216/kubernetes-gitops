replicaCount: 1

image:
  repository: redis
  tag: "7.2"
  pullPolicy: IfNotPresent

labels:
  app: redis
  tier: cache
  environment: lab
  version: "v1"

service:
  type: ClusterIP
  port: 6379
  targetPort: 6379

resources:
  requests:
    cpu: 100m
    memory: 128Mi

  limits:
    cpu: 500m
    memory: 512Mi

persistence:
  enabled: false

probes:
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 5

  liveness:
    initialDelaySeconds: 10
    periodSeconds: 10